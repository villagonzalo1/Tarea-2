<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

    <header class="bg-primary text-white p-3">
        <div class="container d-flex justify-content-between">
            <h4 class="m-0">Aura Dorada</h4>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="languageSwitch">
                <label class="form-check-label">ES/EN</label>
            </div>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="#" data-translate="menuInicio">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-translate="menuProductos">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-translate="menuServicios">Servicios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-translate="menuContacto">Contacto</a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container my-5">
        <div class="text-center mb-5">
            <h2 id="mainTitle">Bienvenido a Nuestro Sitio Web</h2>
            <p id="mainDescription">Descubre nuestras joyas exclusivas</p>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card p-3 text-center">
                    <h5 data-translate="section1Title">Productos</h5>
                    <p data-translate="section1Text">Variedad de anillos y collares.</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card p-3 text-center">
                    <h5 data-translate="section2Title">Servicios</h5>
                    <p data-translate="section2Text">Asesoría personalizada.</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="card p-3 text-center">
                    <h5 data-translate="section3Title">Contacto</h5>
                    <p data-translate="section3Text">Escríbenos para más información.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center p-3">
        © 2024 Aura Dorada
    </footer>

    <script src="/js/translate.js"></script>
</body>

</html>
